<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monetary Policy Game – OST Edition</title>

<style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(#ffffff, #ececec);
    margin: 0;
    padding: 0;
    text-align: center;
  }

  h1 {
    color: #b71c1c;
    margin-top: 20px;
  }

  #game, #endScreen {
    display: none;
  }

  button {
    background-color: #000000;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    margin: 5px;
    cursor: pointer;
    font-size: 16px;
  }

  button:hover {
    background-color: #b71c1c;
  }

  #ecoBox {
    width: 240px;
    height: 170px;
    background-color: #e0e0e0;
    border: 2px solid #000000;
    border-radius: 10px;
    margin: 20px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 1s ease;
    font-size: 20px;
    font-weight: bold;
  }

  #questionBox {
    background: white;
    border-radius: 10px;
    padding: 15px;
    width: 70%;
    margin: 15px auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
  }

  #feedback {
    font-weight: bold;
    margin-top: 10px;
    min-height: 25px;
  }

  #options button {
    width: 90%;
    max-width: 350px;
    margin-top: 8px;
  }
</style>
</head>

<body>

<h1>Monetary Policy Challenge – OST Edition</h1>

<div id="intro">
  <p>Enter your name to begin. You will act as a Federal Reserve policymaker.</p>
  <input id="nameInput" type="text" placeholder="Enter your name" style="padding:8px;font-size:16px;">
  <br><br>
  <button id="startBtn">Start Game</button>
</div>

<div id="game">
  <h2 id="fedName"></h2>
  <h3 id="scoreDisplay"></h3>
  <h3 id="questionCount"></h3>

  <div id="ecoBox">Economy / Inflation</div>

  <div id="questionBox">
    <div id="questionText"></div>
    <div id="feedback"></div>
    <div id="options"></div>
  </div>
</div>

<div id="endScreen">
  <h1>Great Work!</h1>
  <p id="finalMessage"></p>
</div>

<script src="monetarySim.js" defer></script>

</body>
</html>
